<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Álbum Mundial Panini 2026 — gestiona tus cromos">
  <meta name="theme-color" content="#0d6b36">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Álbum Mundial">
  <title>🏆 Álbum Mundial Panini 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-content">
      <div class="header-title">
        <span class="trophy">🏆</span>
        <div>
          <h1>Álbum Mundial</h1>
          <span class="subtitle">Panini FIFA World Cup 2026</span>
        </div>
      </div>
      <div class="stats-mini">
        <div class="stat-pill">
          <span class="stat-num" id="stat-num-obtenidos">—</span>
          <span class="stat-label">tengo</span>
        </div>
        <div class="stat-pill stat-pill-miss">
          <span class="stat-num" id="stat-num-faltan">—</span>
          <span class="stat-label">faltan</span>
        </div>
        <div class="stat-pill stat-pill-pct">
          <span class="stat-num" id="stat-pct">—</span>
        </div>
      </div>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-btn active" data-view="todos">Todos</button>
    <button class="nav-btn" data-view="equipos">Equipos</button>
    <button class="nav-btn" data-view="faltan">Me faltan</button>
    <button class="nav-btn" data-view="repetidos">Repetidos</button>
    <button class="nav-btn" data-view="stats">Estadísticas</button>
  </nav>

  <div class="search-bar" id="search-container">
    <input type="search" id="search-input" placeholder="Buscar jugador o equipo..." autocomplete="off" inputmode="search">
    <span class="search-icon">🔍</span>
  </div>

  <div class="equipo-select" id="equipo-select-container" style="display:none">
    <select id="equipo-select">
      <option value="">Todos los equipos</option>
    </select>
  </div>

  <main id="main-content" class="main-content">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Cargando álbum...</p>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <button class="fab" id="fab-add" title="Añadir jugadores">+</button>

  <!-- Modal añadir jugadores -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Añadir jugadores</span>
        <button class="modal-close" id="modal-close" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body">

        <div class="form-group" style="margin-bottom:14px">
          <label for="modal-grupo">Grupo *</label>
          <input type="text" id="modal-grupo" placeholder="ej: GRUPO A"
                 list="grupos-datalist" autocomplete="off">
          <datalist id="grupos-datalist"></datalist>
        </div>

        <div class="form-row">
          <div class="form-group" style="flex:2">
            <label for="modal-equipo">Equipo *</label>
            <input type="text" id="modal-equipo" placeholder="ej: ARGENTINA"
                   list="equipos-datalist" autocomplete="off">
            <datalist id="equipos-datalist"></datalist>
          </div>
          <div class="form-group">
            <label for="modal-siglas">Siglas</label>
            <input type="text" id="modal-siglas" placeholder="ARG" maxlength="5" autocomplete="off">
          </div>
        </div>

        <div class="form-group" style="margin-bottom:14px">
          <label for="modal-desde">Numerar desde</label>
          <input type="number" id="modal-desde" value="1" min="1" style="max-width:100px">
          <span class="form-hint">Número del primer cromo — los demás se numeran consecutivamente</span>
        </div>

        <div class="form-group">
          <label for="modal-jugadores">Jugadores (uno por línea)</label>
          <textarea id="modal-jugadores"
            placeholder="ESCUDO&#10;PORTERO TITULAR&#10;SEGUNDO PORTERO&#10;DEFENSA 1&#10;DEFENSA 2&#10;..."></textarea>
          <span class="form-hint">Cada línea genera un cromo. Líneas vacías se ignoran.</span>
        </div>

        <div id="modal-preview"></div>

        <button class="btn-submit" id="modal-submit" disabled>Añadir cromos</button>

      </div>
    </div>
  </div>

  <script src="js/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
